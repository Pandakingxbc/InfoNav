defaults:
  - /benchmark/nav/objectnav:
      - objectnav_hm3d
  - _self_

habitat_baselines:
  evaluate: true
  force_torch_single_threaded: true
habitat:
  dataset:
    split: val
    data_path: data/datasets/objectnav/hm3d/v2/{split}/{split}.json.gz
  environment:
    max_episode_steps: 500
    iterator_options:
      cycle: false
      shuffle: false
      max_scene_repeat_steps: 10000000
  task:
    lab_sensors:
      gps_sensor:
        type: GPSSensor
        dimensionality: 3
    measurements:
      success:
        success_distance: 0.2
  simulator:
    habitat_sim_v0:
      allow_sliding: false
      gpu_device_id: 0
    forward_step_size: 0.25
    turn_angle: 30
    agents:
      main_agent:
        radius: 0.18
        sim_sensors:
          depth_sensor:
            min_depth: 0.0
            max_depth: 5.0
            normalize_depth: true
detector:
  # ============== Detection Mode Configuration ==============
  # Mode 1: YOLOv7 + GroundingDINO (ApexNav original, better false positive reduction)
  # Mode 2: D-FINE + GroundingDINO (current InfoNav, for comparison experiments)
  mode: 2  # Mode 1: YOLOv7 + GroundingDINO (ApexNav style)

  yolo:
    # YOLOv7 settings (Mode 1) - matched with ApexNav
    confidence_threshold_yolo: 0.3
    iou_threshold_yolo: 0.5
    agnostic_nms: True

  dfine:
    # D-FINE threshold (Mode 2, not used when mode=1)
    confidence_threshold_dfine: 0.4
    iou_threshold_dfine: 0.5
    agnostic_nms: true

  groundingDINO:
    # GroundingDINO settings - matched with ApexNav
    confidence_threshold_dino: 0.40
    text_threshold: 0.25


llm:
  llm_answer_path: llm/answers/llm_answer_hm3d.txt
  llm_response_path: llm/answers/llm_response_list.txt
  llm_client:
    llm_client: ollama
    ollama: qwen3:8b
record_file_name: record.txt
continue_file_name: continue.txt
need_video: false
video_output_path: videos/test_hm3dv2_{split}
test_epi_num: -1
test_task_num: -1
